<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>MindSeek.edu · Belajar dengan Ai Mi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #eef5fc;
            color: #1e2f3e;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: linear-gradient(135deg, #0b5e7e, #0288d1);
            color: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-circle {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-circle span { font-size: 24px; font-weight: 800; color: #0288d1; }
        .logo-text h1 { font-size: 1.2rem; }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .lang-toggle, .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 2px;
        }
        .lang-btn, .mode-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .lang-btn.active, .mode-btn.active {
            background: white;
            color: #0288d1;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .selection-panel {
            background: white;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
        }
        .selection-panel.hidden { display: none; }
        .selection-row {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .selection-row label {
            font-weight: 600;
            width: 60px;
            font-size: 0.85rem;
            color: #0288d1;
        }
        .selection-row select {
            flex: 1;
            padding: 8px 12px;
            border-radius: 28px;
            border: 1px solid #bcdff0;
            font-size: 0.85rem;
        }
        .summary-chip {
            background: white;
            border-radius: 40px;
            padding: 8px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-chip.hidden { display: none; }
        .chat-box {
            background: white;
            border-radius: 24px;
            overflow-y: auto;
            padding: 16px;
            margin-bottom: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .msg.user {
            background: #0288d1;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }
        .msg.ai {
            background: #f0f7fc;
            border: 1px solid #cfe6f2;
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }
        .msg.system-info {
            background: #fff3e0;
            max-width: 100%;
            font-size: 0.8rem;
            color: #b45f06;
        }
        .loading-indicator {
            background: #f0f7fc;
            padding: 8px 14px;
            border-radius: 20px;
            font-style: italic;
            align-self: flex-start;
        }
        .input-row {
            margin-bottom: 10px;
        }
        .input-row textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #bcdff0;
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
        }
        .button-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .button-row button, .button-row label {
            flex: 1;
            text-align: center;
            background: #0288d1;
            color: white;
            border: none;
            padding: 8px 0;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .upload-label { background: #f0ad4e !important; }
        .send-btn { background: #0288d1 !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-area">
        <div class="logo-circle"><span>MS</span></div>
        <div class="logo-text"><h1>MindSeek.edu</h1></div>
    </div>
    <div class="header-actions">
        <div class="lang-toggle">
            <button class="lang-btn active" data-lang="id">ID</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="siswa">Student</button>
            <button class="mode-btn" data-mode="ortu">Parent</button>
        </div>
    </div>
</div>

<!-- MODE SISWA -->
<div class="container" id="studentView">
    <div id="selectionPanel" class="selection-panel">
        <div class="selection-row"><label>Grade</label><select id="gradeSelect"></select></div>
        <div class="selection-row"><label>Topic</label><select id="topicSelect" disabled></select></div>
        <div class="selection-row"><label>Subject</label><select id="subjectSelect"></select></div>
        <div class="selection-row"><label>Mode</label><select id="sessionTypeSelect">
            <option value="Practice">Latihan</option>
            <option value="PR">PR</option>
        </select></div>
    </div>
    <div id="summaryChip" class="summary-chip hidden">
        <span id="chipText"></span>
        <button id="editSelectionBtn">✏️ Edit</button>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="msg system-info">🌸 Pilih kelas, topik, dan mata pelajaran untuk memulai.</div>
    </div>
    <div class="input-row">
        <textarea id="userInput" rows="1" placeholder="Tanya Ai Mi..."></textarea>
    </div>
    <div class="button-row">
        <button id="sendBtn" class="send-btn">Send</button>
        <label for="fileInput" class="upload-label">Upload</label>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <button id="clearTextBtn">Clear</button>
        <button id="deleteHistoryBtn">Hapus History</button>
    </div>
</div>

<!-- MODE ORANG TUA (sederhana, hanya PIN) -->
<div class="container hidden" id="parentView">
    <div class="pin-section">
        <h2>Parent Access</h2>
        <input type="password" id="pinInput" maxlength="4" placeholder="1234">
        <button id="pinLoginBtn">Login</button>
    </div>
    <div id="reportSection" class="hidden">
        <div id="reportSummary">Loading...</div>
        <button id="refreshReportBtn">Refresh</button>
    </div>
</div>

<script>
    // ========== KONFIGURASI ==========
    const USER_ID = 'siswa_001';
    let currentLanguage = 'id';
    let currentGrade = '';
    let currentTopic = '';
    let currentSubject = 'Matematika';
    let currentSessionType = 'Practice';
    let selectionsMade = false;
    let chatMessages = [];
    let isLoading = false;
    let isParentLogged = false;

    // Data dropdown
    const gradesData = { id: ['Kelas 1', 'Kelas 2', 'Kelas 3', 'Kelas 4', 'Kelas 5', 'Kelas 6'], en: ['Grade 1', 'Grade 2', 'Grade 3', 'Grade 4', 'Grade 5', 'Grade 6'] };
    const topicsData = {
        id: { 'Kelas 1': ['Bilangan 1-10', 'Penjumlahan', 'Pengurangan', 'Bangun Datar'], 'Kelas 2': ['Bilangan 1-100', 'Penjumlahan/Pengurangan', 'Perkalian', 'Pembagian'], 'Kelas 3': ['Pecahan sederhana', 'Perkalian/Pembagian', 'Pengukuran', 'Keliling'], 'Kelas 4': ['Bilangan besar', 'Operasi campuran', 'KPK/FPB', 'Luas bangun'], 'Kelas 5': ['Pecahan', 'Desimal', 'Skala', 'Volume'], 'Kelas 6': ['Persamaan sederhana', 'Statistika', 'Bilangan bulat', 'Ujian sekolah'] },
        en: { 'Grade 1': ['Numbers 1-10', 'Addition', 'Subtraction', 'Shapes'], 'Grade 2': ['Numbers 1-100', 'Add/Subtract', 'Multiplication', 'Division'], 'Grade 3': ['Fractions', 'Multiply/Divide', 'Measurement', 'Perimeter'], 'Grade 4': ['Large Numbers', 'Mixed Operations', 'LCM/GCD', 'Area'], 'Grade 5': ['Fractions', 'Decimals', 'Scale', 'Volume'], 'Grade 6': ['Simple Equations', 'Statistics', 'Integers', 'Final Review'] }
    };
    const subjectsData = {
        id: [{value:'Matematika', label:'Matematika', disabled:false}],
        en: [{value:'Mathematics', label:'Mathematics', disabled:false}]
    };

    // DOM elements
    const studentView = document.getElementById('studentView');
    const parentView = document.getElementById('parentView');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const gradeSelect = document.getElementById('gradeSelect');
    const topicSelect = document.getElementById('topicSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const sessionTypeSelect = document.getElementById('sessionTypeSelect');
    const selectionPanel = document.getElementById('selectionPanel');
    const summaryChip = document.getElementById('summaryChip');
    const chipText = document.getElementById('chipText');
    const editBtn = document.getElementById('editSelectionBtn');

    function appendChat(role, text, isSystem=false) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if (isSystem) div.classList.add('system-info');
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showLoading() {
        const div = document.createElement('div');
        div.className = 'msg ai loading-indicator';
        div.textContent = '💕 Ai Mi is typing...';
        div.id = 'loadingMsg';
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
    function hideLoading() {
        const loading = document.getElementById('loadingMsg');
        if(loading) loading.remove();
    }

    function updateDropdowns() {
        const grades = gradesData[currentLanguage];
        gradeSelect.innerHTML = '<option value="" disabled selected>-- Pilih --</option>';
        grades.forEach(g => gradeSelect.innerHTML += `<option value="${g}">${g}</option>`);
        subjectSelect.innerHTML = '';
        subjectsData[currentLanguage].forEach(sub => {
            const opt = document.createElement('option');
            opt.value = sub.value;
            opt.textContent = sub.label;
            opt.disabled = sub.disabled;
            subjectSelect.appendChild(opt);
        });
        updateTopicDropdown();
    }
    function updateTopicDropdown() {
        const grade = gradeSelect.value;
        if (!grade) {
            topicSelect.disabled = true;
            topicSelect.innerHTML = '<option disabled>-- Pilih kelas dulu --</option>';
            return;
        }
        const topics = topicsData[currentLanguage][grade] || [];
        topicSelect.disabled = false;
        topicSelect.innerHTML = '<option value="" disabled selected>-- Pilih Topik --</option>';
        topics.forEach(t => topicSelect.innerHTML += `<option value="${t}">${t}</option>`);
    }

    function checkAllSelected() {
        const grade = gradeSelect.value;
        const topic = topicSelect.value;
        const subject = subjectSelect.value;
        if (grade && topic && subject && grade !== "" && topic !== "") {
            selectionsMade = true;
            currentGrade = grade;
            currentTopic = topic;
            currentSubject = subject;
            currentSessionType = sessionTypeSelect.value;
            selectionPanel.classList.add('hidden');
            summaryChip.classList.remove('hidden');
            chipText.innerText = `${currentSubject} · ${grade} · ${topic} · ${currentSessionType === 'PR' ? 'PR' : 'Latihan'}`;
            sendContextAndGreeting();
        } else {
            selectionPanel.classList.remove('hidden');
            summaryChip.classList.add('hidden');
            selectionsMade = false;
        }
    }

    async function sendContextAndGreeting() {
        if (!selectionsMade) return;
        let gradeNumber = currentGrade.replace(/\D/g, '');
        if (gradeNumber === '') gradeNumber = '1';
        const triggerMessage = currentLanguage === 'id' 
            ? `Halo Ai Mi, saya kelas ${gradeNumber}, topik ${currentTopic}. Siap belajar dengan bahasa Indonesia`
            : `Hi Ai Mi, I am in grade ${gradeNumber}, topic ${currentTopic}. Ready to learn in English`;
        userInput.value = triggerMessage;
        await sendMessage(true);
        userInput.value = '';
    }

    async function sendMessage(skipClear=false) {
        let message = userInput.value.trim();
        if (!message || isLoading) return;
        isLoading = true;
        sendBtn.disabled = true;
        appendChat('user', message);
        chatMessages.push({ role: 'user', content: message });
        if (!skipClear) userInput.value = '';
        showLoading();
        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: chatMessages,
                    language: currentLanguage,
                    grade: currentGrade,
                    topic: currentTopic,
                    subject: currentSubject,
                    session_type: currentSessionType
                })
            });
            const data = await response.json();
            hideLoading();
            if (!response.ok) {
                appendChat('ai', `Error: ${data.error || 'Ai Mi error'}`);
                return;
            }
            const aiReply = data.reply || 'Maaf, Ai Mi tidak bisa menjawab.';
            appendChat('ai', aiReply);
            chatMessages.push({ role: 'assistant', content: aiReply });
            // Simpan chat (optional)
            fetch('/api/save-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: USER_ID,
                    user_message: message,
                    ai_message: aiReply,
                    subject: currentSubject,
                    grade: currentGrade,
                    topic: currentTopic,
                    session_type: currentSessionType
                })
            }).catch(e => console.warn(e));
        } catch (err) {
            hideLoading();
            appendChat('ai', 'Network error. Coba lagi.');
            console.error(err);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
        }
    }

    // OCR sederhana (opsional)
    document.getElementById('fileInput')?.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        appendChat('system-info', '📸 Memproses gambar...', true);
        // ... (implementasi OCR jika perlu, untuk sini skip dulu)
        appendChat('system-info', 'OCR masih dalam pengembangan. Ketik manual dulu.', true);
    });

    // Parent mode minimal
    async function loadParentReport() {
        const summaryDiv = document.getElementById('reportSummary');
        summaryDiv.innerHTML = 'Loading...';
        try {
            const res = await fetch(`/api/learning-summary?user_id=${USER_ID}`);
            const data = await res.json();
            if (data.topics && data.topics.length) {
                summaryDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } else {
                summaryDiv.innerHTML = 'Belum ada data.';
            }
        } catch(e) {
            summaryDiv.innerHTML = 'Gagal memuat.';
        }
    }
    function loginParent(pin) {
        if (pin === '1234') {
            isParentLogged = true;
            document.getElementById('pinSection')?.classList.add('hidden');
            document.getElementById('reportSection')?.classList.remove('hidden');
            loadParentReport();
        } else { alert('PIN salah'); }
    }
    function switchMode(mode) {
        if (mode === 'siswa') {
            studentView.classList.remove('hidden');
            parentView.classList.add('hidden');
        } else {
            studentView.classList.add('hidden');
            parentView.classList.remove('hidden');
            if (!isParentLogged) {
                document.getElementById('pinSection').classList.remove('hidden');
                document.getElementById('reportSection').classList.add('hidden');
            } else {
                document.getElementById('pinSection').classList.add('hidden');
                document.getElementById('reportSection').classList.remove('hidden');
                loadParentReport();
            }
        }
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.getAttribute('data-mode') === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // Event listeners
    gradeSelect.addEventListener('change', () => { updateTopicDropdown(); topicSelect.value = ""; checkAllSelected(); });
    topicSelect.addEventListener('change', checkAllSelected);
    subjectSelect.addEventListener('change', checkAllSelected);
    sessionTypeSelect.addEventListener('change', () => { if (selectionsMade) checkAllSelected(); });
    editBtn.addEventListener('click', () => { selectionPanel.classList.remove('hidden'); summaryChip.classList.add('hidden'); selectionsMade = false; });
    sendBtn.addEventListener('click', () => sendMessage());
    document.getElementById('clearTextBtn')?.addEventListener('click', () => { userInput.value = ''; });
    document.getElementById('deleteHistoryBtn')?.addEventListener('click', () => { if(confirm('Hapus history?')){ chatMessages = []; while(chatBox.firstChild) chatBox.removeChild(chatBox.firstChild); appendChat('system-info', 'Riwayat dihapus. Pilih kelas, topik, mata pelajaran.', true); selectionsMade = false; selectionPanel.classList.remove('hidden'); summaryChip.classList.add('hidden'); } });
    document.getElementById('pinLoginBtn')?.addEventListener('click', () => { const pin = document.getElementById('pinInput').value; loginParent(pin); });
    document.getElementById('refreshReportBtn')?.addEventListener('click', loadParentReport);

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.getAttribute('data-lang');
            if (lang === currentLanguage) return;
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateDropdowns();
            gradeSelect.value = "";
            topicSelect.disabled = true;
            topicSelect.innerHTML = '<option disabled>-- Pilih --</option>';
            subjectSelect.value = currentLanguage === 'id' ? 'Matematika' : 'Mathematics';
            selectionsMade = false;
            selectionPanel.classList.remove('hidden');
            summaryChip.classList.add('hidden');
            while (chatBox.firstChild) chatBox.removeChild(chatBox.firstChild);
            chatMessages = [];
            appendChat('system-info', currentLanguage === 'id' ? 'Bahasa diubah. Pilih kelas, topik, mata pelajaran.' : 'Language changed. Select grade, topic, subject.', true);
        });
    });
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { switchMode(btn.getAttribute('data-mode')); });
    });

    updateDropdowns();
    switchMode('siswa');
</script>
</body>
</html>
